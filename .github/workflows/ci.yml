name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pyyaml
          # Optional heavy deps — tools degrade gracefully without them.
          pip install statistics || true
      - name: Run test suite
        working-directory: ${{ github.workspace }}
        run: |
          python -m pytest toolkit/tests/ -q

  lint:
    name: lint (compile + pyflakes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check all modules
        run: |
          python -m compileall -q toolkit orchestrator.py watch_daemon.py scripts 2>/dev/null || true
      - name: pyflakes (if available)
        run: |
          pip install pyflakes || true
          python -m pyflakes toolkit orchestrator.py watch_daemon.py || true
